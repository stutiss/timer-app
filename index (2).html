<!DOCTYPE html>
<html>
<head>
<title>Timer</title>
<meta charset="UTF-8">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
  overflow:hidden;
  background:#f7efe5;
}

/* ===== BACKGROUND LAYER ===== */
.bg{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  z-index:-1;
  pointer-events:none;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter: blur(70px);
  opacity:0.6;
  mix-blend-mode:multiply;
  animation: floatBlob 22s ease-in-out infinite;
  will-change: transform;
}

.b1{
  width:420px;
  height:420px;
  background:#e8dbcf;
  top:-120px;
  left:-120px;
}

.b2{
  width:380px;
  height:380px;
  background:#f3e8dd;
  bottom:-140px;
  right:-120px;
  animation-duration:26s;
}

.b3{
  width:300px;
  height:300px;
  background:#d9c7b8;
  top:40%;
  left:55%;
  animation-duration:30s;
}

@keyframes floatBlob{
  0%{transform:translate(0,0) scale(1);}
  25%{transform:translate(60px,-40px) scale(1.05);}
  50%{transform:translate(-40px,60px) scale(0.95);}
  75%{transform:translate(40px,30px) scale(1.08);}
  100%{transform:translate(0,0) scale(1);}
}

/* ===== CARD (GLASS UI) ===== */
.card{
  position:relative;
  z-index:2;
  background:rgba(255,253,251,0.65);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border:1px solid rgba(255,255,255,0.4);
  padding:50px 40px;
  border-radius:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.08);
  text-align:center;
  width:270px;
}

/* ===== BEAR ===== */
.face{ margin-bottom:10px; }

.float{
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-2px); }
  100%{ transform:translateY(0px); }
}

.eye{
  transform-origin:center;
  animation: blink 4s infinite;
}

@keyframes blink{
  0%,90%,100%{ transform:scaleY(1); }
  95%{ transform:scaleY(0.1); }
}

/* ===== TIMER TEXT ===== */
h1{
  font-size:48px;
  color:#7a6f66;
  letter-spacing:2px;
  margin-bottom:20px;
}

/* ===== BUTTONS ===== */
.controls button{
  background:#f3e8dd;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  margin:5px;
  font-size:13px;
  color:#7a6f66;
  cursor:pointer;
  transition:0.25s;
}

.controls button:hover{
  background:#eadccf;
  transform:scale(1.05);
}

/* ===== PICKER ===== */
.custom-wrap{ margin-top:25px; }

.picker{
  display:flex;
  justify-content:center;
  gap:14px;
  position:relative;
}

.col{
  height:120px;
  width:50px;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  text-align:center;
}

.col::-webkit-scrollbar{ display:none; }

.item{
  height:40px;
  line-height:40px;
  scroll-snap-align:center;
  color:#b0a79f;
  font-size:14px;
  transition:0.2s;
}

.item.active{
  color:#7a6f66;
  font-weight:600;
  transform:scale(1.1);
}

.highlight{
  position:absolute;
  top:40px;
  width:100%;
  height:40px;
  border-radius:12px;
  background:#f3e8dd;
  opacity:0.6;
  pointer-events:none;
}

/* set button */
.set{
  margin-top:10px;
  background:#f3e8dd;
  border:none;
  padding:6px 14px;
  border-radius:14px;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

.set:hover{
  background:#eadccf;
  transform:scale(1.05);
}

</style>
</head>

<body>

<!-- BACKGROUND BLOBS -->
<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="card">

<!-- bear -->
<div class="face">
<svg width="28" height="28" viewBox="0 0 64 64">
  <g class="float">
    <circle cx="18" cy="18" r="10" fill="#e8dbcf"/>
    <circle cx="46" cy="18" r="10" fill="#e8dbcf"/>
    <circle cx="32" cy="32" r="20" fill="#f3e8dd"/>
    <circle cx="26" cy="30" r="2.5" fill="#7a6f66" class="eye"/>
    <circle cx="38" cy="30" r="2.5" fill="#7a6f66" class="eye"/>
    <path d="M28 38 Q32 42 36 38" stroke="#7a6f66" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
</div>

<h1 id="time">25:00</h1>

<div class="controls">
<button onclick="start()">start</button>
<button onclick="pause()">pause</button>
<button onclick="reset()">reset</button>
</div>

<div class="custom-wrap">

  <div class="picker">
    <div class="highlight"></div>
    <div class="col" id="hours"></div>
    <div class="col" id="minutes"></div>
  </div>

  <button class="set" onclick="apply()">set</button>

</div>

</div>

<script>
let t = 1500, timer = null;

/* build picker */
function build(col, max){
  for(let i=0;i<=max;i++){
    let d=document.createElement("div");
    d.className="item";
    d.innerText=i;
    col.appendChild(d);
  }
}

function addSpacers(col){
  let top=document.createElement("div");
  top.style.height="40px";

  let bottom=document.createElement("div");
  bottom.style.height="40px";

  col.prepend(top);
  col.appendChild(bottom);
}

let hCol=document.getElementById("hours");
let mCol=document.getElementById("minutes");

build(hCol,24);
build(mCol,59);

addSpacers(hCol);
addSpacers(mCol);

/* scroll snapping */
document.querySelectorAll(".col").forEach(col=>{
  col.addEventListener("scroll",()=>{
    clearTimeout(col.timer);
    col.timer=setTimeout(()=>{
      let index=Math.round((col.scrollTop-40)/40);
      col.scrollTop=(index*40)+40;
      updateActive(col);
    },80);
  });
});

function updateActive(col){
  let items=col.querySelectorAll(".item");
  items.forEach(i=>i.classList.remove("active"));

  let index=Math.round((col.scrollTop-40)/40);
  if(items[index]) items[index].classList.add("active");
}

function getVal(col){
  return Math.max(0, Math.round((col.scrollTop-40)/40));
}

/* timer */
function update(){
  let m=Math.floor(t/60);
  let s=t%60;
  document.getElementById("time").innerText=
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
  if(timer) return;
  timer=setInterval(()=>{
    if(t>0){t--;update();}
  },1000);
}

function pause(){
  clearInterval(timer);
  timer=null;
}

function reset(){
  pause();
  t=1500;
  update();
}

function apply(){
  let h=Math.min(24,getVal(hCol));
  let m=Math.min(59,getVal(mCol));
  t=(h*3600)+(m*60);
  update();
}

update();
updateActive(hCol);
updateActive(mCol);
</script>

</body>
</html>
